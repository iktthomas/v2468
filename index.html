// 30 errors
const errors = [
"ERROR: Access denied",
"CRITICAL FAILURE: Node unreachable",
"WARNING: Suspicious activity detected",
"ERROR: Decryption failed",
"SECURITY ALERT: Firewall triggered",
"FATAL: Connection timeout",

"CRITICAL: System file corrupted",

"ERROR: Security protocol failure",
"CRITICAL: Data integrity compromised",
"WARNING: Unauthorized device connected",
"ERROR: Access token invalid",

"ERROR: Network breach detected",

"ERROR: Memory corruption detected",

// TYPEWRITER (rask + smooth)
function typeLine(text, className = "") {
  return new Promise(resolve => {
    const line = document.createElement("div");
    line.className = className;
    terminal.appendChild(line);

    let i = 0;

    function type() {
      line.textContent = text.substring(0, i);
      i++;

      window.scrollTo(0, document.body.scrollHeight);

      if (i <= text.length) {
        setTimeout(type, 8 + Math.random()*8); // ⚡ raskere
      } else {
        resolve();
      }
    }

    type();
  });
}

// BOOT
const bootSequence = [
"Booting secure kernel...",
"Loading modules...",
"Initializing network interfaces...",
"Mounting encrypted volumes...",
"Starting intrusion engine...",
"Establishing secure tunnel...",
"System ready."
];

let bootIndex = 0;

async function runBoot() {
  while (bootIndex < bootSequence.length) {
    await typeLine(`[BOOT] ${bootSequence[bootIndex]}`);
    bootIndex++;
  }
  loop();
}

// HEX
function randomHex() {
  return Math.random().toString(16).substring(2, 10);
}

// 70/30
async function randomLine() {
  const isError = Math.random() < 0.3;

  if (isError) {
    await typeLine(
      `[${new Date().toLocaleTimeString()}] ${errors[Math.floor(Math.random()*errors.length)]}`,
      "error"
    );
    return;
  }

  const msg = messages[Math.floor(Math.random()*messages.length)];
  await typeLine(
    `[${new Date().toLocaleTimeString()}] ${msg} ${randomHex()}`
  );
}

// CLEANUP
function cleanup() {
  if (terminal.children.length > 800) {
    for (let i = 0; i < 150; i++) {
      if (terminal.firstChild) terminal.removeChild(terminal.firstChild);
    }
  }
}

// BURST MODE LOOP
async function loop() {
  try {
    const isBurst = Math.random() < 0.3; // 30% sjanse

    if (isBurst) {
      // 🔥 BURST: masse linjer raskt
      const burstCount = 6 + Math.floor(Math.random()*6);

      for (let i = 0; i < burstCount; i++) {
        await randomLine();
      }

      cleanup();

      // pause etter burst
      setTimeout(loop, 400 + Math.random()*400);
      return;
    }

    // normal flow
    const count = 2 + Math.floor(Math.random()*3);

    for (let i = 0; i < count; i++) {
      await randomLine();
    }

    cleanup();

    setTimeout(loop, 80 + Math.random()*120);

  } catch (e) {
    setTimeout(loop, 200);
  }
}

// START
setTimeout(runBoot, 500);

// AUTO REFRESH (90 sek)
setTimeout(() => {
  location.reload();
}, 90000);
