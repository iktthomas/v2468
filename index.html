<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Hacker Scan</title>
<style>
  body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
  }
  #terminal {
    padding: 10px;
    white-space: pre-wrap;
    font-size: 14px;
  }
  .error { color: #ff3b3b; }
  .thinking { color: #00ffaa; font-style: italic; }
  .progress {
    display: inline-block;
    width: 200px;
    background: #002200;
    margin-left: 10px;
  }
  .bar {
    height: 10px;
    background: #00ff00;
    width: 0%;
  }
</style>
</head>
<body>
<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

const messages = [
"Intercepting encrypted traffic...",
"Uploading data to remote server...",
"System integrity compromised...",
"Initiating stealth mode...",
"Collecting system metadata...",
"Analyzing packet headers...",
"Decrypting SSL layer...",
"Injecting rootkit...",
"Monitoring network traffic...",
"Capturing live session...",
"Reconstructing data stream...",
"Bypassing intrusion detection...",
"Scanning open sockets...",
"Accessing hidden partitions...",
"Reading kernel memory...",
"Executing remote commands...",
"Establishing persistence...",
"Disabling security services...",
"Extracting system logs...",
"Replaying authentication tokens...",
"Injecting shell access...",
"Resolving hidden services...",
"Mapping device topology...",
"Syncing exploit modules...",
"Bridging to darknet node...",
"Capturing DNS queries...",
"Inspecting firewall rules...",
"Enumerating admin accounts...",
"Checking system vulnerabilities...",
"Uploading payload fragments...",
"Reassembling encrypted files...",
"Monitoring CPU usage...",
"Tracking user activity...",
"Accessing webcam feed...",
"Initializing deep scan...",
"Cracking encryption keys...",
"Spawning hidden process...",
"Injecting script into memory...",
"Analyzing behavior patterns...",
"Linking remote endpoints...",
"Overclocking brute force engine...",
"Rewriting system registry...",
"Extracting browser data...",
"Scanning USB devices...",
"Monitoring input devices...",
"Hooking keyboard input...",
"Intercepting login attempts...",
"Reading clipboard data...",
"Scanning for credentials...",
"Building attack vectors...",
"Launching secondary scan...",
"Indexing system resources...",
"Resolving hidden IPs...",
"Redirecting network traffic...",
"Capturing authentication flow...",
"Breaking sandbox restrictions...",
"Initializing silent protocol...",
"Optimizing attack sequence...",
"Executing background tasks...",
"Collecting entropy data...",
"SYSTEM TRACE INITIATED...",
"TARGET LOCKED...",
"OVERRIDE IN PROGRESS...",
"SECURITY BYPASS SUCCESS...",
"DATA BREACH CONFIRMED..."
];

const errors = [
"ERROR: Access denied",
"CRITICAL FAILURE: Node unreachable",
"WARNING: Suspicious activity detected",
"ERROR: Decryption failed",
"SECURITY ALERT: Firewall triggered",
"FATAL: Connection timeout",
"ERROR: Unauthorized access",
"CRITICAL: Firewall breach detected",
"WARNING: Suspicious login attempt",
"ERROR: Root access denied",
"ALERT: Malware signature detected",
"CRITICAL: System file corrupted",
"ERROR: Privilege escalation failed",
"WARNING: Unusual network behavior",
"ALERT: Multiple intrusion attempts",
"ERROR: Security protocol failure",
"CRITICAL: Data integrity compromised",
"WARNING: Unauthorized device connected",
"ERROR: Access token invalid",
"ALERT: Remote execution blocked",
"CRITICAL: Kernel access denied",
"ERROR: Session hijack detected",
"WARNING: High-risk activity flagged",
"ALERT: Encryption mismatch",
"CRITICAL: Unauthorized root access attempt",
"ERROR: Network breach detected"
];

function randomHex() {
  return Math.random().toString(16).substring(2, 10);
}

function createProgressBar() {
  const container = document.createElement("span");
  container.className = "progress";

  const bar = document.createElement("div");
  bar.className = "bar";

  container.appendChild(bar);

  let progress = 0;
  setInterval(() => {
    progress += Math.random() * 8;
    if (progress >= 100) progress = 0;
    bar.style.width = progress + "%";
  }, 120);

  return container;
}

function randomLine() {
  const line = document.createElement("div");

  if (Math.random() < 0.35) {
    line.textContent = `[${new Date().toLocaleTimeString()}] ${errors[Math.floor(Math.random()*errors.length)]}`;
    line.className = "error";
    return line;
  }

  const msg = messages[Math.floor(Math.random()*messages.length)];
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg} ${randomHex()}`;

  if (Math.random() < 0.3) {
    line.appendChild(createProgressBar());
  }

  return line;
}

function cleanup() {
  if (terminal.children.length > 800) {
    for (let i = 0; i < 150; i++) {
      if (terminal.firstChild) terminal.removeChild(terminal.firstChild);
    }
  }
}

function loop() {
  try {
    const r = Math.random();

    if (r < 0.15) {
      const t = document.createElement("div");
      t.textContent = `[${new Date().toLocaleTimeString()}] thinking...`;
      t.className = "thinking";
      terminal.appendChild(t);
      cleanup();
      window.scrollTo(0, document.body.scrollHeight);
      return setTimeout(loop, 800 + Math.random()*1000);
    }

    if (r < 0.35) {
      for (let i = 0; i < 12; i++) {
        terminal.appendChild(randomLine());
      }
      cleanup();
      window.scrollTo(0, document.body.scrollHeight);
      return setTimeout(loop, 60);
    }

    if (r < 0.5) {
      for (let i = 0; i < 20; i++) {
        const el = document.createElement("div");
        el.textContent = `[${new Date().toLocaleTimeString()}] ${errors[Math.floor(Math.random()*errors.length)]}`;
        el.className = "error";
        terminal.appendChild(el);
      }
      cleanup();
      window.scrollTo(0, document.body.scrollHeight);
      return setTimeout(loop, 80);
    }

    const count = 2 + Math.floor(Math.random()*4);
    for (let i = 0; i < count; i++) {
      terminal.appendChild(randomLine());
    }

    cleanup();
    window.scrollTo(0, document.body.scrollHeight);

    setTimeout(loop, 120 + Math.random()*200);

  } catch (e) {
    setTimeout(loop, 200);
  }
}

setTimeout(loop, 200);
</script>
</body>
</html>
