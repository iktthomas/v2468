<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Scanning...</title>
<style>
  body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
  }
  #terminal {
    padding: 10px;
    white-space: pre-wrap;
    font-size: 14px;
  }
  .error {
    color: #ff2a2a;
    font-weight: bold;
  }
  .progress {
    display: inline-block;
    width: 200px;
    background: #003300;
    margin-left: 10px;
  }
  .bar {
    height: 10px;
    background: #00ff00;
    width: 0%;
  }
</style>
</head>
<body>
<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

const messages = [
  "Initializing system scan...",
  "Bypassing firewall...",
  "Accessing secure node...",
  "Decrypting data packets...",
  "Injecting payload...",
  "Scanning ports...",
  "Tracking IP address...",
  "Establishing connection...",
  "Uploading exploit...",
  "Downloading database...",
  "Root access granted...",
  "Executing command..."
];

const errors = [
  "ERROR: Access denied",
  "CRITICAL FAILURE: Node unreachable",
  "WARNING: Suspicious activity detected",
  "ERROR: Decryption failed",
  "SECURITY ALERT: Firewall triggered",
  "FATAL: Connection timeout"
];

function randomHex() {
  return Math.random().toString(16).substring(2, 10);
}

function createProgressBar() {
  const container = document.createElement("span");
  container.className = "progress";

  const bar = document.createElement("div");
  bar.className = "bar";

  container.appendChild(bar);

  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 15;
    if (progress >= 100) {
      progress = 0; // restart instead of stopping
    }
    bar.style.width = progress + "%";
  }, 80);

  return container;
}

function randomLine() {
  const line = document.createElement("div");

  if (Math.random() < 0.2) {
    line.textContent = `[${new Date().toLocaleTimeString()}] ${errors[Math.floor(Math.random() * errors.length)]}`;
    line.className = "error";
    return line;
  }

  const msg = messages[Math.floor(Math.random() * messages.length)];
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg} ${randomHex()}`;

  if (Math.random() < 0.3) {
    line.appendChild(createProgressBar());
  }

  return line;
}

function spam() {
  const fragment = document.createDocumentFragment();

  for (let i = 0; i < 8; i++) {
    fragment.appendChild(randomLine());
  }

  terminal.appendChild(fragment);

  // Prevent DOM from getting too large (keeps it running forever smoothly)
  if (terminal.children.length > 1000) {
    for (let i = 0; i < 200; i++) {
      terminal.removeChild(terminal.firstChild);
    }
  }

  window.scrollTo(0, document.body.scrollHeight);

  requestAnimationFrame(spam); // NEVER stops
}

// Start loop
spam();
</script>
</body>
</html>
